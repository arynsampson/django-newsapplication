{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}


<div class="auth-box">
    <form method="POST">
        <h1 class="page-title">Create Account</h1>
        {% csrf_token %} 
        {{ form.as_p }}
	<button type="submit" class="btn btn-full">Register</button>
    </form>

    <div class="auth-links">
        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
