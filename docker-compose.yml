services:
  db:
    image: mariadb:11
    container_name: newsapplication_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: newsapplication
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    image: arynsampsonlocal/newsapplication-web:latest
    container_name: newsapplication_web
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: newsapplication
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      - db

volumes:
  db_data: