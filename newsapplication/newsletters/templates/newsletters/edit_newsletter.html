{% extends "base.html" %}
{% block content %}

<div class="edit-newsletter-container">

    <div class="card edit-card">

        <h2>Edit Newsletter</h2>
        <hr>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>
            </div>
        </form>

        <hr class="section-divider">

        <!-- Danger Zone -->
        <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p>Deleting this newsletter is permanent and cannot be undone.</p>

            <form method="post" action="{% url 'delete_newsletter' pk=newsletter.pk %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Delete Newsletter
                </button>
            </form>
        </div>

    </div>

</div>

{% endblock %}
