{% extends "base.html" %}
{% block content %}

<div class="edit-publisher-container">

    <div class="card edit-card">

        <h2>Edit publisher</h2>
        <hr>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>
            </div>
        </form>
    </div>

</div>

{% endblock %}
